# iCM Discovery — Cloud Build Auto-Deploy Pipeline
# ─────────────────────────────────────────────────
# Trigger: Push to "main" branch
# Target:  function-vm (us-central1-a)
# Deploys: Discovery Agent + SI Dashboard
# ─────────────────────────────────────────────────

steps:

  # ══════════════════════════════════════════════════
  # DISCOVERY AGENT
  # ══════════════════════════════════════════════════

  # Step 1: Install Agent dependencies
  - name: 'node:20'
    entrypoint: 'npm'
    args: ['ci']
    dir: 'icm-discovery-agent'
    id: 'agent-install'

  # Step 2: Build Agent
  - name: 'node:20'
    entrypoint: 'npm'
    args: ['run', 'build']
    dir: 'icm-discovery-agent'
    id: 'agent-build'
    waitFor: ['agent-install']

  # ══════════════════════════════════════════════════
  # SI DASHBOARD
  # ══════════════════════════════════════════════════

  # Step 3: Install Dashboard dependencies
  - name: 'node:20'
    entrypoint: 'npm'
    args: ['ci']
    dir: 'icm-si-dashboard'
    id: 'dashboard-install'

  # Step 4: Build Dashboard
  - name: 'node:20'
    entrypoint: 'npm'
    args: ['run', 'build']
    dir: 'icm-si-dashboard'
    id: 'dashboard-build'
    waitFor: ['dashboard-install']

  # ══════════════════════════════════════════════════
  # DEPLOY TO VM
  # ══════════════════════════════════════════════════

  # Step 5: Prepare VM temp directories
  - name: 'gcr.io/cloud-builders/gcloud'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        gcloud compute ssh function-vm \
          --zone=us-central1-a \
          --quiet \
          --command="mkdir -p /tmp/agent-deploy /tmp/dashboard-deploy"
    id: 'prep-vm'
    waitFor: ['agent-build', 'dashboard-build']

  # Step 6: Deploy Agent to VM (SCP to tmp)
  - name: 'gcr.io/cloud-builders/gcloud'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        gcloud compute scp --recurse \
          icm-discovery-agent/dist/* \
          function-vm:/tmp/agent-deploy/ \
          --zone=us-central1-a \
          --quiet
    id: 'deploy-agent'
    waitFor: ['prep-vm']

  # Step 7: Deploy Dashboard to VM (SCP to tmp)
  - name: 'gcr.io/cloud-builders/gcloud'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        gcloud compute scp --recurse \
          icm-si-dashboard/dist/* \
          function-vm:/tmp/dashboard-deploy/ \
          --zone=us-central1-a \
          --quiet
    id: 'deploy-dashboard'
    waitFor: ['prep-vm']

  # Step 8: Move files to /var/www and restart Nginx
  - name: 'gcr.io/cloud-builders/gcloud'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        gcloud compute ssh function-vm \
          --zone=us-central1-a \
          --quiet \
          --command="sudo rm -rf /var/www/agent/* /var/www/dashboard/* && \
            sudo cp -r /tmp/agent-deploy/* /var/www/agent/ && \
            sudo cp -r /tmp/dashboard-deploy/* /var/www/dashboard/ && \
            sudo chown -R www-data:www-data /var/www/agent /var/www/dashboard && \
            rm -rf /tmp/agent-deploy /tmp/dashboard-deploy && \
            sudo nginx -t && sudo systemctl reload nginx"
    id: 'finalize-deploy'
    waitFor: ['deploy-agent', 'deploy-dashboard']

timeout: '600s'
options:
  logging: CLOUD_LOGGING_ONLY
